services:
  redis:
    image: redis:7-alpine

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=voxshelf
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-voxshelf}
      - POSTGRES_DB=voxshelf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxshelf"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    volumes:
      - ./storage:/app/storage
      - ./backend:/app
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://voxshelf:${POSTGRES_PASSWORD:-voxshelf}@postgres:5432/voxshelf
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-audiobooklib}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  worker:
    build: ./backend
    # concurrency=2: ingest loads large PDFs into memory (PyMuPDF block/span
    # dicts balloon 20-25MB PDFs to hundreds of MB); >2 in parallel OOMs the
    # 2GB droplet and 504s the web tier. Raise only alongside more RAM/swap.
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    volumes:
      - ./storage:/app/storage
      - ./backend:/app
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://voxshelf:${POSTGRES_PASSWORD:-voxshelf}@postgres:5432/voxshelf
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-audiobooklib}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
