services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Published only on DB_BIND_IP so the dedicated worker droplet can reach the
    # broker over the VPC. Defaults to loopback for local dev; the web droplet
    # sets DB_BIND_IP=10.120.0.2 (its VPC interface) in .env. Never bind this to
    # a public interface.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    ports:
      - "${DB_BIND_IP:-127.0.0.1}:6379:6379"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=voxshelf
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=voxshelf
    # Same VPC-only exposure as redis (see note above).
    ports:
      - "${DB_BIND_IP:-127.0.0.1}:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxshelf"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./storage:/app/storage
      - ./backend:/app
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DATABASE_URL=postgresql://voxshelf:${POSTGRES_PASSWORD}@postgres:5432/voxshelf
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-audiobooklib}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    # In production the worker runs on a dedicated droplet (docker-compose.worker.yml),
    # not here — this service is behind the "worker" profile so `docker compose up -d`
    # on the web droplet does NOT start it. For an all-in-one local stack, run:
    #   docker compose --profile worker up -d
    profiles: ["worker"]
    # Local all-in-one: one worker consuming every queue. Task routing (see
    # backend/app/celery_app.py) sends ingest to "ingest" and synthesis to
    # "synth", so this must listen to both (plus legacy "celery"). Production
    # splits these into two workers at different concurrency
    # (docker-compose.worker.yml); here concurrency=2 keeps ingest's PyMuPDF
    # memory balloon from OOMing a single local box.
    command: celery -A app.tasks worker --loglevel=info -Q synth,ingest,celery --concurrency=2
    volumes:
      - ./storage:/app/storage
      - ./backend:/app
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DATABASE_URL=postgresql://voxshelf:${POSTGRES_PASSWORD}@postgres:5432/voxshelf
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-audiobooklib}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
