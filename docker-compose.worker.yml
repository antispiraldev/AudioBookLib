# Dedicated worker droplet — runs ONLY the Celery worker.
#
# The worker droplet has no public IP; its outbound internet (OpenAI, R2) is
# NAT'd through the web droplet. The broker (Redis) and database (Postgres) run
# on the web droplet and are reached over the VPC at 10.120.0.2.
#
# Bring up with:
#   docker compose -f docker-compose.worker.yml up -d --build
#
# Requires the same .env as the web droplet (R2 + OpenAI creds); the DB/broker
# URLs below intentionally override whatever .env contains.
# Two workers split by queue (see backend/app/celery_app.py task_routes):
#
#   worker-synth  — network-bound TTS calls; RAM-cheap, so run many in parallel.
#   worker-ingest — PyMuPDF PDF extraction; balloons a 25MB PDF to hundreds of
#                   MB per task, so it stays capped at 2 (the droplet has NO
#                   swap — an OOM is a hard kill, not a slowdown).
#
# worker-synth also consumes the legacy default "celery" queue so tasks enqueued
# before this split (or by an un-migrated backend) still drain.
x-worker-env: &worker-env
  PYTHONPATH: /app
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@10.120.0.2:6379/0
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@10.120.0.2:6379/0
  DATABASE_URL: postgresql://voxshelf:${POSTGRES_PASSWORD}@10.120.0.2:5432/voxshelf
  R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
  R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
  R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
  R2_BUCKET_NAME: ${R2_BUCKET_NAME:-audiobooklib}

services:
  worker-synth:
    build: ./backend
    command: celery -A app.tasks worker --loglevel=info -n synth@%h -Q synth,celery --concurrency=8
    volumes:
      - ./storage:/app/storage
      - ./backend:/app
    env_file: .env
    environment: *worker-env
    restart: unless-stopped

  worker-ingest:
    build: ./backend
    command: celery -A app.tasks worker --loglevel=info -n ingest@%h -Q ingest --concurrency=2
    volumes:
      - ./storage:/app/storage
      - ./backend:/app
    env_file: .env
    environment: *worker-env
    restart: unless-stopped
